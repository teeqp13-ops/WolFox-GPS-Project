name: Build WolFox GPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git perl python3 libssl-dev libfl-dev zlib1g-dev zstd unzip curl

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        mkdir -p ~/theos/sdks
        curl -L https://github.com/theos/sdks/archive/master.zip -o ~/sdks.zip
        unzip -q ~/sdks.zip -d ~/sdks_temp
        mv ~/sdks_temp/sdks-master/*.sdk ~/theos/sdks/
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Setup Toolchain
      run: |
        mkdir -p ~/theos/toolchain
        curl -L https://github.com/theos/toolchain/releases/download/v2.0/linux-x86_64.tar.gz -o ~/toolchain.tar.gz
        tar -xf ~/toolchain.tar.gz -C ~/theos/toolchain --strip-components=1
        echo "PATH=~/theos/toolchain/bin:$PATH" >> $GITHUB_ENV

    - name: Build Package
      run: |
        export THEOS=~/theos
        export PATH=~/theos/toolchain/bin:$PATH
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WolFox-GPS-deb
        path: packages/*.deb
