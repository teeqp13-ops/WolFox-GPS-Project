name: Build WolFox GPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git perl python3 libssl-dev libfl-dev zlib1g-dev zstd

    - name: Setup Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos
        curl -L https://github.com/theos/sdks/archive/master.tar.gz -o ~/sdks.tar.gz
        mkdir -p ~/theos/sdks
        tar -xf ~/sdks.tar.gz -C ~/theos/sdks --strip-components=1
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Setup Toolchain
      run: |
        curl -L https://github.com/kabiroberai/toolchain-linux/releases/download/v2.1.0/toolchain-linux-x86_64.tar.gz -o ~/toolchain.tar.gz
        mkdir -p ~/theos/toolchain
        tar -xf ~/toolchain.tar.gz -C ~/theos/toolchain --strip-components=1
        echo "PATH=~/theos/toolchain/bin:$PATH" >> $GITHUB_ENV

    - name: Build Package
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WolFox-GPS-deb
        path: packages/*.deb
