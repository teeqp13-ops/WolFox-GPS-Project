name: Build WolFox GPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build with Theos
      uses: theos/theos-action@v1
      with:
        theos_sdks: https://github.com/theos/sdks.git
        theos_sdk: iPhoneOS14.5.sdk

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WolFox-GPS-deb
        path: packages/*.deb
