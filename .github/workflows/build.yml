name: Build WolFox GPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Theos
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git perl python3 libssl-dev libfl-dev zlib1g-dev
        git clone --recursive https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Setup iOS SDK
      run: |
        git clone https://github.com/theos/sdks.git ~/theos/sdks_temp
        mkdir -p ~/theos/sdks
        mv ~/theos/sdks_temp/*.sdk ~/theos/sdks/
        rm -rf ~/theos/sdks_temp

    - name: Setup Toolchain
      run: |
        curl -LO https://github.com/PoomSmart/Procursus-Toolchain-Linux/releases/download/v1.0.0/toolchain-linux-x86_64.tar.zst
        sudo apt-get install -y zstd
        mkdir -p ~/theos/toolchain
        tar --use-compress-program=unzstd -xf toolchain-linux-x86_64.tar.zst -C ~/theos/toolchain --strip-components=1
        echo "PATH=~/theos/toolchain/bin:$PATH" >> $GITHUB_ENV

    - name: Build Package
      run: |
        export THEOS=~/theos
        make package FINALPACKAGE=1
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WolFox-GPS-deb
        path: packages/*.deb
